<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Militar Ride PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:60vh;}
.panel{
  padding:15px;
  background:#0f1a10;
  color:white;
}
input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  background:#2e7d32;
  color:white;
  border:none;
}
.trip{
  background:#1b2f22;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <h3>Solicitar viaje</h3>

  <input id="destino" placeholder="Destino">
  <button onclick="crearViaje()">Pedir viaje</button>

  <h3>Estado</h3>
  <div id="estado">Esperando...</div>

  <button onclick="logout()">Salir</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

<script>
let map;
let marker;
let userPos;

// ================= MAPA GRATIS =================
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    userPos = [pos.coords.latitude, pos.coords.longitude];

    map = L.map('map').setView(userPos, 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'OpenStreetMap'
    }).addTo(map);

    marker = L.marker(userPos).addTo(map)
      .bindPopup("Tu ubicación").openPopup();

  });
}

initMap();
</script>

</body>
</html>
