<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Militar</title>
</head>

<body style="background:#111;color:white;text-align:center;padding-top:40px;">

  <h2>Panel Militar</h2>

  <div id="clientePanel">
    <h3>Pedir viaje</h3>
    <input id="origen" placeholder="Origen"><br><br>
    <input id="destino" placeholder="Destino"><br><br>
    <button id="pedirViaje">Solicitar</button>
  </div>

  <hr>

  <h3>Viajes disponibles</h3>
  <div id="viajes"></div>

  <button onclick="logout()">Salir</button>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>

</body>
</html>
